<!DOCTYPE html>
<html>
<head>
    <title>Order Success</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;
            text-align: center;
            padding-top: 100px;
        }

        .box {
            background: white;
            display: inline-block;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        .btn {
            padding: 10px 15px;
            margin-top: 15px;
            background: #0984e3;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>🎉 Order Placed Successfully!</h1>

    <p>Your total amount was:</p>
    <h2>₹{{ total }}</h2>

    <p>Thank you for shopping with us ❤️</p>

    <a href="/" class="btn">🛍 Continue Shopping</a>
</div>

</body>
</html>
